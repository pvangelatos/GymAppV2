<div class="container-fluid px-4 py-4">
  <div class="page-header d-flex justify-content-between align-items-center">
  <div>
    <h2><i class="ti ti-calendar" style="color:#606c38; font-size:22px;"></i> Bookings</h2>
    <p style="color:#606c38;" class="mb-0">Manage class bookings</p>
  </div>
  <button class="btn btn-primary px-4" (click)="openAddModal()">
    <i class="ti ti-plus"></i> Add Booking
  </button>
</div>

  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <div class="card">
    <div class="card-body p-0">
      <table *ngIf="!isLoading && bookings.length > 0" class="table mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>Member ID</th>
            <th>TimeSlot ID</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let booking of bookings">
            <td>{{ booking.id }}</td>
            <td>{{ booking.memberId }}</td>
            <td>{{ booking.timeSlotId }}</td>
            <td class="text-muted">{{ booking.bookingDate }}</td>
            <td>
              <span class="badge rounded-pill px-3"
                style="background:#eff6ff; color:#2563eb;">
                {{ booking.status }}
              </span>
            </td>
            <td>
              <button class="btn btn-sm btn-outline-danger" (click)="deleteBooking(booking.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div *ngIf="!isLoading && bookings.length === 0" class="alert alert-info mt-3">
    No bookings found.
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="bookingModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">➕ Add Booking</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Member ID</label>
          <input type="number" class="form-control" [(ngModel)]="form.memberId"/>
        </div>
        <div class="mb-3">
          <label class="form-label">TimeSlot ID</label>
          <input type="number" class="form-control" [(ngModel)]="form.timeSlotId"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Booking Date</label>
          <input type="date" class="form-control" [(ngModel)]="form.bookingDate"/>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" (click)="closeModal()">Cancel</button>
        <button class="btn btn-primary px-4" (click)="saveBooking()">Save</button>
      </div>
    </div>
  </div>
</div>
