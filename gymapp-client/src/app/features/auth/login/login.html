<div class="min-vh-100 d-flex align-items-center justify-content-center"
  style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
  <div class="card shadow-lg" style="width: 420px; border-radius: 20px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div style="font-size: 3rem;">💪</div>
        <h3 class="fw-bold mt-2" style="color: #4f46e5;">GymApp V2</h3>
        <p class="text-muted">Sign in to your account</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger py-2">
        {{ errorMessage }}
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control form-control-lg"
          [(ngModel)]="email" placeholder="admin@gymapp.com"/>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control form-control-lg"
          [(ngModel)]="password" placeholder="••••••••"/>
      </div>
      <button class="btn btn-primary w-100 py-3 fw-semibold"
        style="font-size: 1rem;" (click)="login()">
        Sign In →
      </button>
    </div>
  </div>
</div>
